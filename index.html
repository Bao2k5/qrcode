<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gửi Nemo nhỏ 💖</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Outfit:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: 'Outfit', sans-serif;
            overflow: hidden !important;
            user-select: none;
        }

        /* The Touch Button Scanner */
        #start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            transition: opacity 1.5s ease-in-out;
        }

        .finger-print-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 20, 147, 0.1);
            border: 2px solid #ff69b4;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
            animation: pulse-ring 2s infinite;
            position: relative;
            overflow: hidden;
            margin-bottom: 25px;
            cursor: pointer;
            transition: all 0.5s;
        }

        .finger-print-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            pointer-events: none;
            /* Prevent dragging the image */
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: #fff;
            box-shadow: 0 0 15px #fff, 0 0 30px #ff69b4;
            opacity: 0;
            pointer-events: none;
        }

        .scan-line.scanning {
            opacity: 1;
            animation: scanAnim 1.2s ease-in-out infinite alternate;
        }

        @keyframes scanAnim {
            0% {
                top: 10%;
            }

            100% {
                top: 90%;
            }
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 0 40px rgba(255, 105, 180, 0.8), 0 0 60px rgba(255, 20, 147, 0.6);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
            }
        }

        .start-text {
            color: white;
            text-shadow: 0 0 10px #ff69b4, 0 0 20px #ff1493;
            font-family: 'Outfit', sans-serif;
            font-size: 1.3rem;
            font-weight: 300;
            text-align: center;
            padding: 0 20px;
            transition: all 0.5s;
        }

        /* World Container */
        #romantic-world {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 10;
        }

        /* 3D Canvas */
        #webgl-canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 11;
        }

        /* The Message Box */
        .glass-card {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 182, 193, 0.2);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            color: #fff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(255, 20, 147, 0.1);
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .glass-card.visible {
            opacity: 1;
            pointer-events: auto;
        }

        h1.title {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            margin: 0 0 15px 0;
            color: #ff8cbe;
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.8);
        }

        .message-text {
            font-size: 1rem;
            line-height: 1.6;
            color: #fdf0f5;
            font-weight: 300;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        }

        /* Chat Message Bubbles */
        .chat-container {
            position: absolute;
            top: 0px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            width: 92%;
            max-width: 420px;
            max-height: 22vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 10px 0;
            opacity: 0;
            pointer-events: none;
            scrollbar-width: none;
        }

        .chat-container::-webkit-scrollbar {
            display: none;
        }

        .chat-bubble {
            align-self: flex-start;
            background: rgba(30, 30, 40, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 105, 180, 0.25);
            border-radius: 18px 18px 18px 4px;
            padding: 10px 16px;
            color: #ffe0f0;
            font-size: 0.92rem;
            line-height: 1.5;
            font-family: 'Outfit', sans-serif;
            font-weight: 300;
            max-width: 88%;
            box-shadow: 0 4px 15px rgba(255, 20, 147, 0.15);
            animation: bubblePop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            word-break: break-word;
        }

        .chat-bubble.first {
            background: rgba(255, 20, 147, 0.2);
            border-color: rgba(255, 105, 180, 0.5);
            font-family: 'Dancing Script', cursive;
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffb6c1;
            text-shadow: 0 0 8px rgba(255, 105, 180, 0.6);
        }

        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #ff69b4;
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        @keyframes bubblePop {
            from {
                transform: scale(0.8) translateY(10px);
                opacity: 0;
            }

            to {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        @keyframes glowPulse {
            0% {
                filter: drop-shadow(0 0 5px rgba(255, 105, 180, 0.5));
            }

            100% {
                filter: drop-shadow(0 0 20px rgba(255, 20, 147, 0.9));
                transform: translateX(-50%) scale(1.05);
            }
        }

        /* Mobile Touch Effect */
        .touch-sparkle {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, #ff69b4 50%, transparent 100%);
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            animation: touchSparkleFade 0.8s ease-out forwards;
            box-shadow: 0 0 15px #ff69b4, 0 0 30px #ff1493;
        }

        @keyframes touchSparkleFade {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, calc(-50% - 30px)) scale(2);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <!-- Audio -->
    <audio id="bgMusic" loop preload="auto">
        <source src="love-language.m4a" type="audio/mp4">
        <source src="love-language.webm" type="audio/webm">
    </audio>

    <!-- Overlay Scanner -->
    <div id="start-overlay">
        <div class="finger-print-btn" id="fingerBtn" onmousedown="pressDown()" onmouseup="pressUp()"
            onmouseleave="pressUp()" ontouchstart="pressDown(event)" ontouchend="pressUp(event)">
            <!-- BẠN THAY TÊN FILE HÌNH CỦA BẠN VÀO ĐÂY NHÉ (VÍ DỤ: anh-cua-nemo.jpg) -->
            <img src="anh-cua-ban.jpg" alt="Avatar" id="fingerImg"
                onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=Nemo&background=ff69b4&color=fff&size=120';">
            <div class="scan-line" id="scanLine"></div>
        </div>
        <h2 class="start-text" id="scanText">Chạm và <b>Giữ</b> để nhận diện... 💖</h2>
    </div>

    <div class="chat-container" id="chatContainer"></div>

    <div id="romantic-world">
        <!-- We will put Three.js canvas here -->
    </div>


    <!-- Import Three.js via CDN -->
    <script type="importmap">
        {
          "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
          }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls;
        let heartParticles, textRings = [];
        let nemoGroup;
        let nemoSparkles = []; // Array to hold sparkle particles
        let nemoTargetSpeed = 0.8;
        let nemoCurrentSpeed = 0.8;
        let time = 0;
        let isStarted = false;

        // Interaction
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        let scanTimer;
        let isUnlocked = false;

        window.pressDown = function (e) {
            if (e) e.preventDefault(); // prevent mouse emulation on touch
            if (isUnlocked || isStarted) return;

            // UNLOCK AUDIO ON FIRST TOUCH (for mobile autoplay policy)
            const audio = document.getElementById('bgMusic');
            if (audio.paused) {
                audio.volume = 0; // Play silently to unlock
                audio.play().catch(err => console.log("Audio unlock failed:", err));
            }

            const text = document.getElementById('scanText');
            const scanLine = document.getElementById('scanLine');
            const btn = document.getElementById('fingerBtn');

            text.innerHTML = "Đang xác nhận danh tính...<br>Giữ yên nhé ✨";
            scanLine.classList.add('scanning');
            btn.style.animation = "none";
            btn.style.transform = "scale(1.1)";
            btn.style.border = "2px solid #fff";
            btn.style.boxShadow = "0 0 50px rgba(255, 105, 180, 1)";

            scanTimer = setTimeout(() => {
                isUnlocked = true;
                text.innerHTML = "Xác nhận thành công!<br>Đây là Nemo nè 💖";
                scanLine.classList.remove('scanning');
                btn.style.background = "rgba(255, 255, 255, 0.9)";
                btn.style.boxShadow = "0 0 100px #fff, 0 0 150px #ff1493";

                setTimeout(() => {
                    startExperience();
                }, 1000);
            }, 2500); // Wait 2.5 seconds
        }

        window.pressUp = function (e) {
            if (e) e.preventDefault();
            if (isUnlocked || isStarted) return;
            clearTimeout(scanTimer);

            const text = document.getElementById('scanText');
            const scanLine = document.getElementById('scanLine');
            const btn = document.getElementById('fingerBtn');

            text.innerHTML = "Quá trình bị ngắt!<br>Chạm và <b>Giữ</b> để quét lại 💖";
            scanLine.classList.remove('scanning');
            btn.style.animation = "pulse-ring 2s infinite";
            btn.style.transform = "scale(1)";
            btn.style.border = "2px solid #ff69b4";
            btn.style.boxShadow = "0 0 20px rgba(255, 105, 180, 0.5)";
        }

        window.startExperience = function () {
            if (isStarted) return;
            isStarted = true;

            const audio = document.getElementById('bgMusic');
            audio.volume = 1.0; // Play loudly
            if (audio.paused) {
                audio.play().catch(e => console.log("Audio play blocked: ", e));
            }

            const overlay = document.getElementById('start-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                startChatAnimation();
                initThreeJS();
            }, 1000);
        }

        // ── Chat Typewriter ─────────────────────────────────────────────────
        function startChatAnimation() {
            const messages = [
                { text: 'Chúc mừng 8/3 Nemo nhỏ ❤️', cls: 'first' },
                { text: 'Chúc Nemo 3 đừng, 3 không, 3 nhớ...' },
                { text: 'Đừng quá khắt khe với bản thân,' },
                { text: 'đừng hoài nghi chính mình và' },
                { text: 'đừng từ chối mà hãy luôn nhận lời ebao rủ đi chơi nha 😄' },
                { text: 'Không buồn nhiều quá, không áp lực quá và không một mình chịu đựng nữa 💪' },
                { text: 'Nhớ giữ sức khỏe, nhớ cười nhiều hơn và nhớ là có một người đáng yêu luôn chờ nemo 💕' },
                { text: 'Đáng yêu ý là anh đáng yêu ấy, không phải đáng yêu kia đâu nha 😊' },
                { text: 'Buổi xem phim hôm nay vui hong? Nếu vui thì mình sẽ có những dịp sau nữa nho ✨' },
            ];

            const container = document.getElementById('chatContainer');
            container.style.opacity = '1';

            let msgIdx = 0;
            const CHAR_SPEED = 38;
            const PAUSE = 700; // pause between bubbles

            function typeNextMessage() {
                if (msgIdx >= messages.length) return;

                const { text, cls } = messages[msgIdx];
                msgIdx++;

                // Create new bubble (accumulates — not cleared)
                const bubble = document.createElement('div');
                bubble.className = 'chat-bubble' + (cls ? ' ' + cls : '');
                container.appendChild(bubble);

                // Blinking cursor
                const cursor = document.createElement('span');
                cursor.className = 'typing-cursor';
                bubble.appendChild(cursor);

                // Auto-scroll to new bubble
                container.scrollTop = container.scrollHeight;

                // Type characters one by one
                let charIdx = 0;
                const interval = setInterval(() => {
                    if (charIdx < text.length) {
                        bubble.insertBefore(document.createTextNode(text[charIdx]), cursor);
                        charIdx++;
                        container.scrollTop = container.scrollHeight;
                    } else {
                        clearInterval(interval);
                        cursor.remove();
                        setTimeout(typeNextMessage, PAUSE);
                    }
                }, CHAR_SPEED);
            }

            // Allow user to manually scroll too
            container.style.pointerEvents = 'auto';
            setTimeout(typeNextMessage, 800);
        }

        function initThreeJS() {
            const container = document.getElementById('romantic-world');

            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.002);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 250;
            camera.position.y = 50;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x000000, 1);
            container.appendChild(renderer.domElement);

            // Orbit controls for mobile interaction
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.enableZoom = false; // Disable zoom to keep composition
            controls.enablePan = false;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 2.0;
            // Limit vertical rotation to keep it looking good
            controls.minPolarAngle = Math.PI / 3;
            controls.maxPolarAngle = Math.PI / 1.5;

            createHeart();
            createRotatingTextRings();
            createStarfield();
            createNemo();

            window.addEventListener('resize', onWindowResize);

            // Interaction listeners for Nemo
            window.addEventListener('click', onPointerClick);
            window.addEventListener('touchstart', onPointerTouch, { passive: false });

            animate();
        }

        function onPointerClick(event) {
            if (!isStarted || !nemoGroup) return;
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            checkNemoInteraction();
        }

        function onPointerTouch(event) {
            if (!isStarted || !nemoGroup || event.touches.length === 0) return;
            mouse.x = (event.touches[0].clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.touches[0].clientY / window.innerHeight) * 2 + 1;
            checkNemoInteraction();
        }

        function checkNemoInteraction() {
            raycaster.setFromCamera(mouse, camera);
            // Check intersection with Nemo's particle mesh
            const intersects = raycaster.intersectObject(nemoGroup.children[0]);

            if (intersects.length > 0) {
                // Nemo gets startled! Swim fast.
                nemoTargetSpeed = 3.5;

                // Add a burst of speed by aggressively jumping the time forward slightly
                time += 1.0;

                // Reset speed back to normal after a short time
                setTimeout(() => {
                    nemoTargetSpeed = 0.8;
                }, 2000);
            }
        }

        function createHeart() {
            const particleCount = 18000; // Increased density for more solid look
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            const sizes = new Float32Array(particleCount);

            const color1 = new THREE.Color(0xff69b4); // Hot Pink
            const color2 = new THREE.Color(0xff1493); // Deep Pink
            const color3 = new THREE.Color(0xffffff); // White

            for (let i = 0; i < particleCount; i++) {
                // Heart math formula (generating points on surface + volume)
                let x, y, z;

                // Randomly choose between outline and fill
                const t = Math.PI * 2 * Math.random();
                const u = Math.PI * Math.random();

                // Base heart shape parametric equations
                const bx = 16 * Math.pow(Math.sin(t), 3);
                const by = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);

                // Add depth and volume randomness
                const spreadX = Math.random() * 2 - 1;
                const spreadY = Math.random() * 2 - 1;
                const spreadZ = Math.random() * 2 - 1;

                const factor = 5 + Math.random() * 2; // Scale

                // Hollow vs Solid mix
                const radius = Math.cbrt(Math.random());

                x = bx * factor * radius + spreadX * 5;
                y = by * factor * radius + spreadY * 5;
                // Deeper Z for 3D effect based on X/Y distance from center
                z = (Math.random() - 0.5) * 40 * Math.pow(1 - Math.abs(bx) / 16, 0.5);

                positions[i * 3] = x;
                positions[i * 3 + 1] = y + 40; // Move up
                positions[i * 3 + 2] = z;

                // Color tinting mostly pink, some white sparkles
                const randColor = Math.random();
                let mixedColor;
                if (randColor > 0.95) mixedColor = color3;
                else if (randColor > 0.5) mixedColor = color1;
                else mixedColor = color2;

                // Vary slightly
                mixedColor.lerp(new THREE.Color(0xffb6c1), Math.random() * 0.3);

                colors[i * 3] = mixedColor.r;
                colors[i * 3 + 1] = mixedColor.g;
                colors[i * 3 + 2] = mixedColor.b;

                sizes[i] = Math.random() * 3.5 + 0.5; // Larger base size (0.5 to 4.0)
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            // Custom shader material for glowing points
            const material = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    globalScale: { value: window.innerHeight / 1000 } // scale by screen
                },
                vertexShader: `
                    uniform float time;
                    uniform float globalScale;
                    attribute vec3 color;
                    attribute float size;
                    varying vec3 vColor;
                    void main() {
                        vColor = color;
                        // Heartbeat throb effect
                        float throb = sin(time * 3.0) * 0.05 + 1.0;
                        vec3 pos = position * throb;
                        
                        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * globalScale * (300.0 / -mvPosition.z);
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        // Soft glowing circle
                        vec2 xy = gl_PointCoord.xy - vec2(0.5);
                        float ll = length(xy);
                        if(ll > 0.5) discard;
                        
                        // Soft edge with higher base brightness (1.5 max instead of 0.8)
                        float alpha = (0.5 - ll) * 3.0; // steeper falloff but much brighter center
                        gl_FragColor = vec4(vColor, alpha);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            heartParticles = new THREE.Points(geometry, material);
            scene.add(heartParticles);
        }

        // Circular Text Ring using Canvas Texture
        function createTextTexture(text, hue) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1024;
            canvas.height = 128; // Wide ribbon

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.font = 'bold 60px "Outfit", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Text color based on hue
            ctx.fillStyle = `hsl(${hue}, 100%, 75%)`;
            // Add slight glow
            ctx.shadowColor = `hsl(${hue}, 100%, 60%)`;
            ctx.shadowBlur = 10;

            // Repeat text to wrap around circle
            const repeatedText = `${text}   💖   ${text}   💖   ${text}   💖   `;
            ctx.fillText(repeatedText, canvas.width / 2, canvas.height / 2);

            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.repeat.x = 2; // Repeat texture horizontally
            return texture;
        }

        function createRotatingTextRings() {
            const texts = [
                "Happy Women's Day 8/3",
                "Phụ Nữ Việt Nam",
                "Luôn Xinh Đẹp Và Hạnh Phúc",
                "Mãi Rạng Rỡ Như Hoa"
            ];

            const ringCount = texts.length;
            const startRadius = 80;
            const radiusStep = 30;
            const startY = -60;
            const yStep = -20;

            for (let i = 0; i < ringCount; i++) {
                const radius = startRadius + i * radiusStep;
                const yPos = startY + i * yStep;
                const hue = 320 + (i * 15); // Pink variations

                const texture = createTextTexture(texts[i], hue);

                // Cylinder for text ribbon
                const geometry = new THREE.CylinderGeometry(radius, radius, 15, 64, 1, true); // true = openEnded
                const material = new THREE.MeshBasicMaterial({
                    map: texture,
                    transparent: true,
                    opacity: 0.85,
                    side: THREE.DoubleSide,
                    depthWrite: false,
                    blending: THREE.AdditiveBlending
                });

                const ring = new THREE.Mesh(geometry, material);
                ring.position.y = yPos;

                // Custom properties for animation
                ring.userData = {
                    rotationSpeed: (0.005 + Math.random() * 0.005) * (i % 2 === 0 ? 1 : -1),
                    textureOffsetSpeed: 0.002 * (i % 2 === 0 ? -1 : 1)
                };

                scene.add(ring);
                textRings.push(ring);
            }
        }

        function createStarfield() {
            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            for (let i = 0; i < 3000; i++) {
                // Spherical distribution
                const r = 300 + Math.random() * 400;
                const theta = Math.acos(Math.random() * 2 - 1);
                const phi = Math.random() * Math.PI * 2;

                const x = r * Math.sin(theta) * Math.cos(phi);
                const y = r * Math.sin(theta) * Math.sin(phi);
                const z = r * Math.cos(theta);

                vertices.push(x, y, z);
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            const material = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 1.5,
                transparent: true,
                opacity: 0.6
            });
            const stars = new THREE.Points(geometry, material);
            scene.add(stars);
        }

        function createNemo() {
            nemoGroup = new THREE.Group();

            const particleCount = 4000;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            const colorOrange = new THREE.Color(0xff6600);
            const colorWhite = new THREE.Color(0xffffff);
            const colorBlack = new THREE.Color(0x222222);

            for (let i = 0; i < particleCount; i++) {
                let x, y, z;
                let isBody = Math.random() > 0.3; // 70% body, 30% fins/tail

                if (isBody) {
                    // Ellipsoid body
                    const u = Math.random() * Math.PI * 2;
                    const v = Math.random() * Math.PI;
                    const r = Math.cbrt(Math.random()); // Solid volume

                    x = r * Math.cos(u) * Math.sin(v) * 20; // Length
                    y = r * Math.sin(u) * Math.sin(v) * 10; // Height
                    z = r * Math.cos(v) * 6; // Width
                } else {
                    // Tail & Fins
                    let isTail = Math.random() > 0.5;
                    if (isTail) {
                        // Tail fin (flat triangle-ish at the back)
                        const rx = -20 - Math.random() * 15;
                        const ry = (Math.random() - 0.5) * 20 * (Math.abs(rx + 20) / 15 + 0.2);
                        const rz = (Math.random() - 0.5) * 2;
                        x = rx; y = ry; z = rz;
                    } else {
                        // Top/Bottom fins
                        const rx = (Math.random() - 0.3) * 15;
                        const ry = (Math.random() > 0.5 ? 1 : -1) * (10 + Math.random() * 8);
                        const rz = (Math.random() - 0.5) * 2;
                        x = rx; y = ry; z = rz;
                    }
                }

                // Stripe Coloring logic based on X position
                let c = colorOrange;
                // Stripe 1 (Head/Gills)
                if (x > 5 && x < 9) c = colorWhite;
                else if ((x >= 4 && x <= 5) || (x >= 9 && x <= 10)) c = colorBlack;
                // Stripe 2 (Middle)
                else if (x > -5 && x < -1) c = colorWhite;
                else if ((x >= -6 && x <= -5) || (x >= -1 && x <= 0)) c = colorBlack;
                // Stripe 3 (Tail base)
                else if (x > -18 && x < -15) c = colorWhite;
                else if ((x >= -19 && x <= -18) || (x >= -15 && x <= -14)) c = colorBlack;
                // Fin tips black
                else if (Math.abs(y) > 14 || x < -30) c = colorBlack;

                positions[i * 3] = x;
                positions[i * 3 + 1] = y;
                positions[i * 3 + 2] = z;

                colors[i * 3] = c.r;
                colors[i * 3 + 1] = c.g;
                colors[i * 3 + 2] = c.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 1.5,
                vertexColors: true,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending
            });

            const fishParticles = new THREE.Points(geometry, material);
            nemoGroup.add(fishParticles);

            // Initial position far out
            nemoGroup.position.set(200, 50, -100);

            scene.add(nemoGroup);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            if (heartParticles && heartParticles.material.uniforms) {
                heartParticles.material.uniforms.globalScale.value = window.innerHeight / 1000;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;

            // Update heart shader time
            if (heartParticles) {
                heartParticles.material.uniforms.time.value = time;
                heartParticles.rotation.y = Math.sin(time * 0.5) * 0.2; // Slight wobble
            }

            // Animate text rings
            textRings.forEach(ring => {
                ring.rotation.y += ring.userData.rotationSpeed;
                if (ring.material.map) {
                    ring.material.map.offset.x += ring.userData.textureOffsetSpeed;
                }
            });

            // Animate Nemo Fish
            if (nemoGroup) {
                // Smoothly interpolate current speed towards target speed
                nemoCurrentSpeed += (nemoTargetSpeed - nemoCurrentSpeed) * 0.05;

                // Procedural swimming path (Infinity orbit around the heart)
                const orbitRadius = 150;

                // Use a separate accumulator for swimming position to handle speed changes gracefully
                if (!nemoGroup.userData.swimAccumulator) nemoGroup.userData.swimAccumulator = 0;
                nemoGroup.userData.swimAccumulator += nemoCurrentSpeed * 0.016;

                const swimProgress = nemoGroup.userData.swimAccumulator;

                // Infinity figure-eight path
                const targetX = Math.sin(swimProgress) * orbitRadius;
                const targetZ = Math.sin(swimProgress * 0.5) * orbitRadius * 1.5;
                const targetY = Math.cos(swimProgress * 1.2) * 30 + 20;

                // Move Nemo smoothy towards target
                nemoGroup.position.x += (targetX - nemoGroup.position.x) * 0.05;
                nemoGroup.position.y += (targetY - nemoGroup.position.y) * 0.05;
                nemoGroup.position.z += (targetZ - nemoGroup.position.z) * 0.05;

                // Calculate direction for Nemo to face
                const dx = targetX - nemoGroup.position.x;
                const dz = targetZ - nemoGroup.position.z;
                const angle = Math.atan2(dx, dz);

                // Smoothly rotate Nemo to face swim direction
                nemoGroup.rotation.y += (angle - nemoGroup.rotation.y) * 0.1;

                // Wag the tail (wobble the whole fish slightly on Y axis based on speed)
                // Wag faster if swimming faster
                nemoGroup.children[0].rotation.y = Math.sin(time * 15 * (nemoCurrentSpeed / 0.8)) * 0.2;
                // Swim bobbing
                nemoGroup.children[0].rotation.z = Math.sin(time * 5) * 0.1;

                // --- Nemo Sparkle Trail Logic ---
                // Emit sparkles more frequently if swimming fast
                let emitThreshold = nemoCurrentSpeed > 1.5 ? 0.1 : 0.4;
                if (Math.random() > emitThreshold) { // Emit freq
                    // Calculate tail offset based on current rotation
                    const tailOffsetZ = -25; // Tail is behind
                    const cosA = Math.cos(nemoGroup.rotation.y);
                    const sinA = Math.sin(nemoGroup.rotation.y);

                    const tailX = nemoGroup.position.x + (tailOffsetZ * sinA);
                    const tailZ = nemoGroup.position.z + (tailOffsetZ * cosA);
                    const tailY = nemoGroup.position.y + (Math.random() - 0.5) * 10;

                    // Create a single sparkle mesh
                    const sparkleGeom = new THREE.BufferGeometry();
                    sparkleGeom.setAttribute('position', new THREE.Float32BufferAttribute([0, 0, 0], 3));
                    const sparkleMat = new THREE.PointsMaterial({
                        color: Math.random() > 0.5 ? 0xffffff : 0xffd700, // Gold and White
                        size: 1.5 + Math.random(),
                        transparent: true,
                        opacity: 1.0,
                        blending: THREE.AdditiveBlending,
                        depthWrite: false
                    });

                    const sparkle = new THREE.Points(sparkleGeom, sparkleMat);
                    sparkle.position.set(
                        tailX + (Math.random() - 0.5) * 5,
                        tailY,
                        tailZ + (Math.random() - 0.5) * 5
                    );

                    // Add physics properties
                    sparkle.userData = {
                        velocity: new THREE.Vector3(
                            (Math.random() - 0.5) * 0.5,
                            (Math.random() - 0.1) * 0.2, // Float up slightly
                            (Math.random() - 0.5) * 0.5
                        ),
                        life: 1.0,
                        decay: 0.01 + Math.random() * 0.02
                    };

                    scene.add(sparkle);
                    nemoSparkles.push(sparkle);
                }
            }

            // Update all Nemo sparkles
            for (let i = nemoSparkles.length - 1; i >= 0; i--) {
                const sp = nemoSparkles[i];
                // Move based on velocity
                sp.position.add(sp.userData.velocity);
                // Slowly fade out
                sp.userData.life -= sp.userData.decay;
                sp.material.opacity = sp.userData.life;

                // Add slight wobble
                sp.position.x += Math.sin(time * 5 + i) * 0.2;

                if (sp.userData.life <= 0) {
                    scene.remove(sp);
                    sp.geometry.dispose();
                    sp.material.dispose();
                    nemoSparkles.splice(i, 1);
                }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // Touch sparkles everywhere
        document.addEventListener('touchstart', function (e) {
            let touch = e.touches[0];
            if (touch && isStarted) {
                let sparkle = document.createElement('div');
                sparkle.className = 'touch-sparkle';
                sparkle.style.left = touch.pageX + 'px';
                sparkle.style.top = touch.pageY + 'px';
                document.body.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 800);
            }
        }, { passive: true });

    </script>
</body>
