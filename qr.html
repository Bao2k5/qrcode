<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Trái Tim 8/3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #fff8f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: sans-serif;
            gap: 18px;
        }

        #wrapper {
            background: #fff;
            padding: 28px;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(200, 0, 40, 0.2);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
        }

        .btn {
            padding: 13px 36px;
            background: #c62828;
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(198, 40, 40, 0.4);
            text-decoration: none;
            display: inline-block;
        }

        .hint {
            color: #888;
            font-size: 0.82rem;
            margin: 0;
        }

        #q-hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div id="q-hidden"></div>
    <div id="wrapper"><canvas id="c"></canvas></div>
    <a id="dl" class="btn">💾 Tải ảnh QR về</a>
    <p class="hint">Dùng Camera hoặc Zalo để quét phần ô vuông ở giữa nhé!</p>

    <script>
        (() => {
            const URL = 'https://qrcode-fawn-one.vercel.app/';
            const QR_COLOR = '#c62828';  // dark red
            const BG_COLOR = '#ffffff';

            // -- Generate QR and grab the internal matrix --
            const hiddenEl = document.getElementById('q-hidden');
            const qrObj = new QRCode(hiddenEl, {
                text: URL,
                width: 256, height: 256,
                colorDark: '#000', colorLight: '#fff',
                correctLevel: QRCode.CorrectLevel.H,
            });
            const internalQR = qrObj._oQRCode;
            const N = internalQR.moduleCount; // e.g. 33

            // Module cell size for the real QR
            const CELL = 11;  // px per real QR module

            // Real QR square size
            const qrSize = N * CELL;

            // Decorative "wing" pixel unit size (same as CELL for consistency)
            const D = CELL;

            // We'll draw the real QR in the center of a larger canvas.
            // The heart wings extend outward. A heart that wraps a square
            // needs two round bumps at the top-left and top-right, and a point at the bottom.
            // Strategy: build a pixel grid where:
            //   - the center NxN region = real QR
            //   - surrounding cells = decorative heart pattern (fake QR noise in heart shape)

            // We build a total grid. The heart outline pixels go OUTSIDE the QR square.
            // Heart extends about 30% on each side.
            const PAD = Math.round(N * 0.30);  // padding cells around QR (30%)
            const totalCols = N + PAD * 2;     // total columns in canvas grid
            const totalRows = N + PAD * 2;     // total rows

            const cvs = document.getElementById('c');
            cvs.width = totalCols * D;
            cvs.height = totalRows * D;
            const ctx = cvs.getContext('2d');

            // Fill white
            ctx.fillStyle = BG_COLOR;
            ctx.fillRect(0, 0, cvs.width, cvs.height);

            // Helper: is a grid cell (gr, gc) inside the heart outline ZONE
            // (outside the real QR square but in the decorative heart region)?
            function cellInsideHeart(gr, gc) {
                // Normalize to [-1, 1] relative to full canvas
                const nx = ((gc + 0.5) / totalCols) * 2 - 1;
                const ny = ((gr + 0.5) / totalRows) * 2 - 1;
                // Shift heart up slightly so QR square aligns with lower half of heart
                const hx = nx;
                const hy = -ny + 0.18;
                // Heart implicit: (x²+y²-1)³ - x²y³ ≤ 0
                return Math.pow(hx * hx + hy * hy - 1, 3) - hx * hx * Math.pow(hy, 3) <= 0;
            }

            function cellInRealQR(gr, gc) {
                return gr >= PAD && gr < PAD + N && gc >= PAD && gc < PAD + N;
            }

            // Draw decorative fake QR modules in heart zone (outside real QR)
            // Use a seeded-ish pseudo-random pattern that looks like QR
            function fakeDark(gr, gc) {
                // A checkerboard-ish noise that looks like QR data
                const seed = (gr * 73856093) ^ (gc * 19349663);
                const v = ((seed >>> 0) % 100);
                return v < 45; // ~45% density for a QR-like look
            }

            // --- STEP 1: Draw heart decorative zone ---
            for (let gr = 0; gr < totalRows; gr++) {
                for (let gc = 0; gc < totalCols; gc++) {
                    if (cellInRealQR(gr, gc)) continue; // skip, real QR drawn later
                    if (!cellInsideHeart(gr, gc)) continue; // outside heart
                    if (!fakeDark(gr, gc)) continue; // only dark modules

                    const px = gc * D;
                    const py = gr * D;

                    // Rounded dot for decorative zone
                    ctx.fillStyle = QR_COLOR;
                    const rad = D * 0.38;
                    ctx.beginPath();
                    ctx.roundRect(px + 1, py + 1, D - 2, D - 2, rad);
                    ctx.fill();
                }
            }

            // --- STEP 2: Draw the real QR code in the center ---
            for (let r = 0; r < N; r++) {
                for (let c = 0; c < N; c++) {
                    if (!internalQR.isDark(r, c)) continue;

                    const gr = r + PAD;
                    const gc = c + PAD;
                    const px = gc * D;
                    const py = gr * D;

                    ctx.fillStyle = QR_COLOR;

                    // Finder patterns stay square; data modules get slightly rounded
                    const isFinder = (r < 9 && c < 9) || (r < 9 && c >= N - 9) || (r >= N - 9 && c < 9);
                    if (isFinder) {
                        ctx.fillRect(px, py, D, D);
                    } else {
                        const rad = D * 0.35;
                        ctx.beginPath();
                        ctx.roundRect(px + 1, py + 1, D - 2, D - 2, rad);
                        ctx.fill();
                    }
                }
            }

            // --- STEP 3: White background for real QR area (light modules) ---
            // This ensures the real QR has clean white cells for scannability
            for (let r = 0; r < N; r++) {
                for (let c = 0; c < N; c++) {
                    if (internalQR.isDark(r, c)) continue;

                    const gr = r + PAD;
                    const gc = c + PAD;
                    const px = gc * D;
                    const py = gr * D;

                    ctx.fillStyle = BG_COLOR;
                    ctx.fillRect(px, py, D, D);
                }
            }

            // Redraw dark modules on top (since white may have overwritten some edge cases)
            for (let r = 0; r < N; r++) {
                for (let c = 0; c < N; c++) {
                    if (!internalQR.isDark(r, c)) continue;
                    const gr = r + PAD;
                    const gc = c + PAD;
                    const px = gc * D;
                    const py = gr * D;
                    ctx.fillStyle = QR_COLOR;
                    const isFinder = (r < 9 && c < 9) || (r < 9 && c >= N - 9) || (r >= N - 9 && c < 9);
                    if (isFinder) {
                        ctx.fillRect(px, py, D, D);
                    } else {
                        ctx.beginPath();
                        ctx.roundRect(px + 1, py + 1, D - 2, D - 2, D * 0.35);
                        ctx.fill();
                    }
                }
            }

            // --- Download button ---
            const dl = document.getElementById('dl');
            dl.href = cvs.toDataURL('image/png');
            dl.download = 'qr-trai-tim-8-3.png';
        })();
    </script>
</body>

</html>
