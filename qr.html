<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mã QR Lãng Mạn 8/3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle at center, #ffd1dc 0%, #f48fb1 100%);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            perspective: 1000px;
        }

        .container {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 50px 30px;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(233, 30, 99, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.5);
            text-align: center;
            position: relative;
            z-index: 10;
            max-width: 400px;
            width: 90%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-15px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #d81b60;
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
        }

        p {
            color: #ad1457;
            font-size: 1rem;
            margin-bottom: 30px;
            font-weight: 600;
        }

        /* 3D Flip Card Container */
        .qr-card {
            width: 260px;
            height: 260px;
            margin: 0 auto;
            position: relative;
            cursor: pointer;
            transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }

        .qr-card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 30px;
            background: #fff;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        /* Front Side: Mystery Heart */
        .card-front {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            flex-direction: column;
            border: 4px solid #fff;
        }

        .big-heart {
            font-size: 100px;
            animation: pulse-heart 1.2s infinite;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.8));
            cursor: pointer;
        }

        @keyframes pulse-heart {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
            }

            100% {
                transform: scale(1);
            }
        }

        .tap-hint {
            margin-top: 15px;
            color: #fff;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        /* Back Side: The QR Code */
        .card-back {
            transform: rotateY(180deg);
            padding: 20px;
            background: #fff;
        }

        #qrcode {
            margin: 0 auto;
        }

        .hint {
            margin-top: 30px;
            font-size: 0.95rem;
            color: #d81b60;
            background: rgba(255, 255, 255, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            display: inline-block;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .flipped+.hint {
            opacity: 1;
        }

        .link-text {
            display: block;
            margin-top: 15px;
            font-size: 0.8rem;
            color: #d81b60;
            text-decoration: underline;
            cursor: pointer;
        }

        /* Floating particles */
        .particle {
            position: absolute;
            pointer-events: none;
            opacity: 0.5;
            z-index: 1;
        }
    </style>
</head>

<body>

    <div style="position: absolute; top: 10%; left: 10%; font-size: 80px; opacity: 0.3; transform: rotate(-15deg);">🌸
    </div>
    <div style="position: absolute; bottom: 10%; right: 10%; font-size: 100px; opacity: 0.3; transform: rotate(15deg);">
        🌺</div>
    <div style="position: absolute; top: 15%; right: 15%; font-size: 60px; opacity: 0.2; transform: rotate(30deg);">✨
    </div>
    <div style="position: absolute; bottom: 20%; left: 15%; font-size: 70px; opacity: 0.2; transform: rotate(-20deg);">
        💖</div>

    <div class="container">
        <h1 id="titleText">Bí Mật Dành Cho Bạn</h1>
        <p id="descText">Chạm vào trái tim bên dưới nhé!</p>

        <div class="qr-card" id="qrCard" onclick="flipCard()">
            <div class="card-face card-front">
                <div class="big-heart">❤️</div>
                <div class="tap-hint">Chạm để mở</div>
            </div>
            <div class="card-face card-back">
                <div id="qrcode"></div>
            </div>
        </div>

        <div class="hint" id="scanHint">Hãy quét mã này bằng Zalo nhé!</div>
        <a class="link-text" href="index.html">Hoặc nhấn vào đây nếu không quét được</a>
    </div>

    <script>
        // Set the URL directly to the live Vercel deployment
        var localUrl = 'https://qrcode-fawn-one.vercel.app/';

        var qrcode = new QRCode(document.getElementById("qrcode"), {
            text: localUrl,
            width: 220,
            height: 220,
            colorDark: "#d81b60",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        function flipCard() {
            const card = document.getElementById('qrCard');
            const hint = document.getElementById('scanHint');
            const title = document.getElementById('titleText');
            const desc = document.getElementById('descText');

            if (!card.classList.contains('flipped')) {
                card.classList.add('flipped');
                hint.style.opacity = '1';
                title.innerText = "Món Quà 8/3";
                desc.innerText = "Sẵn sàng đón nhận bất ngờ chưa?";

                // Trigger a confetti or sparkle effect
                createMagicBurst();
            }
        }

        function createMagicBurst() {
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerText = ['✨', '💖', '🌸', '🏮'][Math.floor(Math.random() * 4)];
                p.style.left = '50%';
                p.style.top = '50%';
                p.style.fontSize = (Math.random() * 20 + 20) + 'px';

                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 200 + 50;
                const tx = Math.cos(angle) * dist;
                const ty = Math.sin(angle) * dist;

                document.body.appendChild(p);

                p.animate([
                    { transform: 'translate(-50%, -50%) scale(0)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(1.5)`, opacity: 0 }
                ], {
                    duration: 1000 + Math.random() * 1000,
                    easing: 'ease-out'
                }).onfinish = () => p.remove();
            }
        }
    </script>
</body>

</html>
