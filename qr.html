<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mã QR Lãng Mạn 8/3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle at center, #ffd1dc 0%, #f48fb1 100%);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 50px 40px;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(233, 30, 99, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.5);
            text-align: center;
            position: relative;
            z-index: 10;
            max-width: 400px;
            width: 90%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-15px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #d81b60;
            font-size: 3rem;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
        }

        p {
            color: #ad1457;
            font-size: 1.1rem;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .qr-wrapper {
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            display: inline-block;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        #qrcode {
            margin: 0 auto;
        }

        .heart-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                transform: translate(-50%, -50%) scale(1.15);
            }

            100% {
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .hint {
            margin-top: 30px;
            font-size: 0.95rem;
            color: #d81b60;
            background: rgba(255, 255, 255, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            display: inline-block;
            font-weight: bold;
        }

        .link-text {
            display: block;
            margin-top: 15px;
            font-size: 0.8rem;
            color: #d81b60;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div style="position: absolute; top: 10%; left: 10%; font-size: 80px; opacity: 0.3; transform: rotate(-15deg);">🌸
    </div>
    <div style="position: absolute; bottom: 10%; right: 10%; font-size: 100px; opacity: 0.3; transform: rotate(15deg);">
        🌺</div>
    <div style="position: absolute; top: 15%; right: 15%; font-size: 60px; opacity: 0.2; transform: rotate(30deg);">✨
    </div>
    <div style="position: absolute; bottom: 20%; left: 15%; font-size: 70px; opacity: 0.2; transform: rotate(-20deg);">
        💖</div>

    <div class="container">
        <h1>Món Quà Bí Mật</h1>
        <p>Quét mã này để nhận quà 8/3 nhé!</p>

        <div class="qr-wrapper">
            <div id="qrcode"></div>
            <div class="heart-icon">💖</div>
        </div>

        <div class="hint">Dùng Camera hoặc Zalo để quét</div>
        <a class="link-text" href="index.html">Hoặc nhấn vào đây để xem trực tiếp</a>
    </div>

    <script>
        // Set the URL directly to the live Vercel deployment
        var localUrl = 'https://qrcode-fawn-one.vercel.app/';

        var qrcode = new QRCode(document.getElementById("qrcode"), {
            text: localUrl,
            width: 220,
            height: 220,
            colorDark: "#d81b60",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    </script>
</body>

</html>
