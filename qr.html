<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Trái Tim 8/3</title>
    <!-- qrcodejs as table renderer - force DrawType -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #fff8f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: sans-serif;
            gap: 16px;
        }

        #wrapper {
            background: #fff;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(200, 0, 40, 0.25);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
        }

        .btn {
            padding: 13px 36px;
            background: #c62828;
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(198, 40, 40, 0.4);
            text-decoration: none;
            display: inline-block;
        }

        .hint {
            color: #888;
            font-size: 0.82rem;
            margin: 0;
        }

        #q-hidden {
            display: none;
        }
    </style>
</head>

<body>
    <!-- hidden table-mode QR generator -->
    <div id="q-hidden"></div>

    <div id="wrapper">
        <canvas id="c"></canvas>
    </div>

    <a id="dl" class="btn">💾 Tải ảnh về điện thoại</a>
    <p class="hint">Quét ô vuông trung tâm bằng Camera hoặc Zalo nhé!</p>

    <script>
        (() => {
            const URL = 'https://qrcode-fawn-one.vercel.app/';
            const CELL = 14;              // px per module
            const QR_COLOR = '#c62828'; // dark red
            const BG_COLOR = '#ffffff';

            /* ---- Force TABLE mode ---- */
            const hiddenEl = document.getElementById('q-hidden');

            // Patch: DrawType inside qrcodejs exposes HXXTable = 1
            const qrObj = new QRCode(hiddenEl, {
                text: URL,
                width: 256,
                height: 256,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H,
            });

            // qrcodejs exposes the internal qr object at _htOption & _oQRCode
            // We need the moduleCount and isDark method
            const internalQR = qrObj._oQRCode;

            if (!internalQR) {
                // Fallback: parse the table that might still be in the DOM
                const img = hiddenEl.querySelector('canvas, img');
                console.error('Cannot access internal QR object', img);
                return;
            }

            const N = internalQR.moduleCount;

            /* ---- Set up canvas ---- */
            const cvs = document.getElementById('c');
            cvs.width = N * CELL;
            cvs.height = N * CELL;
            const ctx = cvs.getContext('2d');
            ctx.fillStyle = BG_COLOR;
            ctx.fillRect(0, 0, cvs.width, cvs.height);

            /* ---- Heart mask: returns true if (cx, cy) is inside a heart ---- */
            function insideHeart(nx, ny) {
                // nx, ny are normalized to [-1, 1]
                // Shift up so the pointy bottom is nicely framed
                const x = nx;
                const y = -ny + 0.1;  // flip + shift
                // Heart equation: (x² + y² - 1)³ - x²y³ ≤ 0
                const v = Math.pow(x * x + y * y - 1, 3) - x * x * Math.pow(y, 3);
                return v <= 0;
            }

            /* ---- Finder-pattern guard ---- */
            function isFinder(r, c) {
                return (r < 9 && c < 9) ||             // top-left
                    (r < 9 && c >= N - 9) ||        // top-right
                    (r >= N - 9 && c < 9);          // bottom-left
            }

            /* ---- Draw ---- */
            for (let r = 0; r < N; r++) {
                for (let c = 0; c < N; c++) {
                    const dark = internalQR.isDark(r, c);
                    if (!dark) continue;

                    const finder = isFinder(r, c);

                    // Normalized position in [-1.15, 1.15]
                    const nx = ((c + 0.5) / N) * 2.3 - 1.15;
                    const ny = ((r + 0.5) / N) * 2.3 - 1.15;

                    if (!finder && !insideHeart(nx, ny)) continue;

                    const px = c * CELL;
                    const py = r * CELL;

                    ctx.fillStyle = QR_COLOR;
                    if (finder) {
                        // Square for finder patterns (required for scannability)
                        ctx.fillRect(px, py, CELL, CELL);
                    } else {
                        // Rounded dot inside the heart
                        const rad = Math.min(CELL * 0.38, 4);
                        ctx.beginPath();
                        ctx.roundRect(px + 1, py + 1, CELL - 2, CELL - 2, rad);
                        ctx.fill();
                    }
                }
            }

            /* ---- Download button ---- */
            const dl = document.getElementById('dl');
            dl.href = cvs.toDataURL('image/png');
            dl.download = 'qr-trai-tim-8-3.png';
        })();
    </script>
</body>

</html>
